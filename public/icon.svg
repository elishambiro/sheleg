<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Document background -->
  <rect x="8" y="4" width="38" height="50" rx="3" ry="3" fill="#364fc7"/>
  <!-- Document fold corner -->
  <polygon points="36,4 46,14 36,14" fill="#2a3fa0"/>
  <!-- White lines simulating text -->
  <rect x="14" y="22" width="20" height="3" rx="1" fill="white" opacity="0.9"/>
  <rect x="14" y="30" width="24" height="3" rx="1" fill="white" opacity="0.9"/>
  <rect x="14" y="38" width="16" height="3" rx="1" fill="white" opacity="0.9"/>
  <!-- Snowflake overlay (bottom right) -->
  <g transform="translate(42,44)" fill="#74c0fc">
    <!-- Center -->
    <circle cx="0" cy="0" r="2.5"/>
    <!-- 6 arms -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#74c0fc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8.66" y1="-5" x2="8.66" y2="5" stroke="#74c0fc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8.66" y1="5" x2="8.66" y2="-5" stroke="#74c0fc" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Branch tips -->
    <line x1="0" y1="-10" x2="-3" y2="-7" stroke="#74c0fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="3" y2="-7" stroke="#74c0fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="-3" y2="7" stroke="#74c0fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="3" y2="7" stroke="#74c0fc" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
